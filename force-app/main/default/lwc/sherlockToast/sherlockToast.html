<template>
    <div class="toast-container slds-is-fixed">
        <template for:each={toasts} for:item="item">
            <div key={item.id} class={item.containerClass} role="status">
                <span class={item.iconClass} title={item.variant}>
                    <lightning-icon icon-name={item.iconName} variant="inverse" size="small"></lightning-icon>
                </span>
                <div class="slds-col slds-align-middle slds-var-p-horizontal_small">
                    <h2 class="slds-text-heading_small slds-truncate">{item.title}</h2>
                    <div class="slds-text-body_regular">{item.message}</div>
                </div>
                <div class="slds-col_bump-left slds-var-p-left_small">
                    <lightning-button-icon 
                        icon-name="utility:close" 
                        variant="bare-inverse" 
                        title="Close" 
                        onclick={handleClose} 
                        data-id={item.id}>
                    </lightning-button-icon>
                </div>
            </div>
        </template>

    </div>
</template>
