<template>
    <template lwc:if={isOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_small" aria-modal="true">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="閉じる" onclick={handleClose}>
                        <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                        <span class="slds-assistive-text">閉じる</span>
                    </button>
                    <h2 class="slds-text-heading_medium slds-hyphenate">{flowButtonLabel}</h2>
                </header>
                <div class="slds-modal__content slds-var-p-around_medium" style="min-height: 200px;">
                    <lightning-flow
                        flow-api-name={flowApiName}
                        flow-input-variables={flowInputVariables}
                        onstatuschange={handleStatusChange}>
                    </lightning-flow>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
