<template>
    <!-- Favorites Management Grid -->
    <div class="slds-grid slds-grid_vertical-align-center slds-var-p-bottom_medium slds-var-m-bottom_medium slds-border_bottom">
        <div class="slds-col slds-grow-none">
            <lightning-icon icon-name="utility:favorite" size="xx-small" class="slds-var-m-right_x-small"></lightning-icon>
        </div>
        <div class="slds-col slds-grow" style="min-width: 0;">
            <lightning-combobox
                name="favorites"
                label="お気に入り検索条件"
                variant="label-hidden"
                value={selectedFavoriteId}
                placeholder="お気に入り検索条件を選択"
                options={favoriteOptions}
                onchange={handleFavoriteSelectionChange}
                class="slds-var-m-right_xx-small"
                style="width: 100%;">
            </lightning-combobox>
        </div>
        <div class="slds-col slds-grow-none slds-var-m-left_xx-small">
            <lightning-button-icon 
                icon-name="utility:retail_execution" 
                variant="border-filled" 
                alternative-text="お気に入り検索条件を保存"
                title="お気に入り検索条件を保存する"
                onclick={openSaveModal}
                disabled={isLoading}>
            </lightning-button-icon>
            <template lwc:if={selectedFavoriteId}>
                <lightning-button-icon 
                    icon-name="utility:delete" 
                    variant="border-filled" 
                    alternative-text="お気に入り検索条件を削除" 
                    title="お気に入り検索条件を削除する"
                    data-id={selectedFavoriteId}
                    onclick={handleDeleteRequest}
                    class="slds-var-m-left_xx-small">
                </lightning-button-icon>
            </template>
        </div>
    </div>

    <!-- Save Favorite Modal -->
    <template lwc:if={isSaveModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="閉じる" onclick={closeSaveModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                        <span class="slds-assistive-text">閉じる</span>
                    </button>
                    <h2 class="slds-text-heading_medium slds-hyphenate">検索条件をお気に入りに保存</h2>
                </header>
                <div class="slds-modal__content slds-var-p-around_medium">
                    <template lwc:if={selectedFavoriteId}>
                        <lightning-radio-group name="saveType"
                            label="保存オプション"
                            options={saveOptions}
                            value={saveType}
                            onchange={handleSaveTypeChange}
                            type="radio">
                        </lightning-radio-group>
                    </template>
                    
                    <template lwc:if={isSaveAsNew}>
                        <lightning-input 
                            type="text" 
                            label="お気に入り検索条件名" 
                            value={newFavoriteName} 
                            onchange={handleNewFavoriteNameChange}
                            class="slds-var-m-top_small"
                            required>
                        </lightning-input>
                    </template>
                </div>
                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" onclick={closeSaveModal}>キャンセル</button>
                    <button class="slds-button slds-button_brand" onclick={handleSaveExecute} disabled={isSaveDisabled}>保存</button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
